<svg width="512" height="512" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="ib">
      <rect width="200" height="200" rx="44"/>
    </clipPath>
    <clipPath id="xs">
      <polygon points="0,0 200,0 0,200"/>
    </clipPath>
    <clipPath id="cs">
      <polygon points="200,0 200,200 0,200"/>
    </clipPath>

    <radialGradient id="x-bg" cx="30%" cy="25%" r="80%">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#06060e"/>
    </radialGradient>

    <radialGradient id="c-bg" cx="70%" cy="75%" r="80%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8ee"/>
    </radialGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="0.6" y2="0.6">
      <stop offset="0%"  stop-color="white" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#ib)">

    <g clip-path="url(#xs)">
      <rect width="200" height="200" fill="url(#x-bg)"/>
    </g>
    <g clip-path="url(#cs)">
      <rect width="200" height="200" fill="url(#c-bg)"/>
    </g>

    <g clip-path="url(#xs)">
      <ellipse cx="58" cy="64" rx="42" ry="40" fill="#4466ff" opacity="0.07"/>
      <path fill="white" d="M28,34 L52,34 L100,100 L76,100 Z"/>
      <path fill="white" d="M76,34 L100,34 L52,100 L28,100 Z"/>
      <path fill="white" opacity="0.25" d="M28,34 L38,34 L58,61 L48,61 Z"/>
      <path fill="white" opacity="0.25" d="M76,34 L86,34 L66,61 L56,61 Z"/>
    </g>

    <g clip-path="url(#cs)">
      <circle cx="136" cy="137" r="40" fill="black" opacity="0.08"/>
      <path fill="#EA4335" d="M135,135 L135,97 A38,38 0,0,1 167.9,154 Z"/>
      <path fill="#FBBC04" d="M135,135 L167.9,154 A38,38 0,0,1 102.1,154 Z"/>
      <path fill="#34A853" d="M135,135 L102.1,154 A38,38 0,0,1 135,97 Z"/>
      <circle cx="135" cy="135" r="23" fill="white"/>
      <circle cx="135" cy="135" r="17" fill="#4285F4"/>
      <circle cx="130" cy="129" r="6"  fill="white" opacity="0.22"/>
    </g>

    <line x1="200" y1="0" x2="0" y2="200" stroke="white" stroke-width="24"  stroke-opacity="0.03"/>
    <line x1="200" y1="0" x2="0" y2="200" stroke="white" stroke-width="10"  stroke-opacity="0.07"/>
    <line x1="200" y1="0" x2="0" y2="200" stroke="white" stroke-width="3"   stroke-opacity="0.30"/>
    <line x1="200" y1="0" x2="0" y2="200" stroke="white" stroke-width="0.8" stroke-opacity="0.90"/>

    <rect width="200" height="200" rx="44" fill="url(#sheen)"/>
    <rect width="200" height="200" rx="44" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.10"/>

  </g>
</svg>
